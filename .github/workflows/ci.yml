name: CI / Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

jobs:
  # ── Build & Test ─────────────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: windows-latest
    permissions:
      contents: read
      actions: read
      checks: write
      statuses: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # MinVer needs full git history for tag resolution

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: dotnet test --no-build -c Release --logger "trx;LogFileName=results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/results.trx'

  # ── Release ──────────────────────────────────────────────────────────────────
  release:
    name: Release
    needs: build-and-test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest

    permissions:
      contents: write         # needed to create GitHub Releases

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore & Publish app (win-x64)
        run: |
          dotnet publish src/ManagedDrive.App/ManagedDrive.App.csproj `
            -c Release `
            -r win-x64 `
            -o publish/
        shell: pwsh

      - name: Resolve version from tag
        id: version
        run: |
          $tag = "${{ github.ref_name }}"          # e.g. v1.2.3
          echo "tag=$tag"   >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Build portable package
        run: |
          $tag = "${{ steps.version.outputs.tag }}"
          $zip = "ManagedDrive-$tag-win-x64-portable.zip"
          Compress-Archive -Path publish\* -DestinationPath $zip
        shell: pwsh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ManagedDrive ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            ManagedDrive-${{ steps.version.outputs.tag }}-win-x64-portable.zip
