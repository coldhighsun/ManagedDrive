name: CI / Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

jobs:
  # ── Build & Test ─────────────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: windows-latest
    permissions:
      contents: read
      actions: read
      checks: write
      statuses: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # MinVer needs full git history for tag resolution

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: dotnet test --no-build -c Release --logger "trx;LogFileName=results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/results.trx'

  # ── Publish MSI Release ───────────────────────────────────────────────────────
  release:
    name: Publish MSI
    needs: build-and-test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest

    permissions:
      contents: write         # needed to create GitHub Releases

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install WiX v4 toolset
        run: dotnet tool install --global wix --version 4.0.5

      - name: Add WiX UI extension
        run: wix extension add WixToolset.UI.wixext/4.0.5

      - name: Add WiX Util extension
        run: wix extension add WixToolset.Util.wixext/4.0.5

      - name: Restore & Publish app (self-contained, win-x64)
        run: |
          dotnet publish src/ManagedDrive.App/ManagedDrive.App.csproj `
            -c Release `
            -r win-x64 `
            -o publish/
        shell: pwsh

      - name: Resolve version from tag
        id: version
        run: |
          $tag = "${{ github.ref_name }}"          # e.g. v1.2.3
          $ver = $tag.TrimStart('v')                # e.g. 1.2.3
          echo "tag=$tag"   >> $env:GITHUB_OUTPUT
          echo "version=$ver" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Build MSI (en-US base)
        run: |
          wix build installer/ManagedDrive.wxs `
            -ext WixToolset.UI.wixext `
            -ext WixToolset.Util.wixext `
            -arch x64 `
            -culture en-US `
            -loc installer/en-US.wxl `
            -d "PublishDir=publish\" `
            -d "ProductVersion=${{ steps.version.outputs.version }}" `
            -o "base-en-US.msi"
        shell: pwsh

      - name: Build MSI (zh-CN)
        run: |
          wix build installer/ManagedDrive.wxs `
            -ext WixToolset.UI.wixext `
            -ext WixToolset.Util.wixext `
            -arch x64 `
            -culture zh-CN `
            -loc installer/zh-CN.wxl `
            -d "PublishDir=publish\" `
            -d "ProductVersion=${{ steps.version.outputs.version }}" `
            -o "base-zh-CN.msi"
        shell: pwsh

      - name: Build multilingual MSI (embed zh-CN transform)
        run: |
          $tag = "${{ steps.version.outputs.tag }}"
          $out = "ManagedDrive-$tag-win-x64.msi"
          Copy-Item base-en-US.msi $out
          wix msi transform base-en-US.msi base-zh-CN.msi -t language -o zh-CN.mst
          cscript //NoLogo installer/EmbedTransform.vbs $out zh-CN.mst 2052
        shell: pwsh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ManagedDrive ${{ github.ref_name }}
          generate_release_notes: true
          files: ManagedDrive-${{ steps.version.outputs.tag }}-win-x64.msi
